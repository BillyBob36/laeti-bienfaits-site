<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Laëti'Bienfaits — Site en construction</title>
<link rel="preload" href="img/construction-bg.jpg?v=2" as="image">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:#fff;
    background:#2b3a26 url('img/construction-bg.jpg?v=2') center/cover no-repeat fixed;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
    position:relative;
  }
  body::before{
    content:'';position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(20,28,16,.4) 0%,rgba(20,28,16,.55) 50%,rgba(20,28,16,.7) 100%);
    z-index:0;
  }
  .card{
    position:relative;z-index:1;
    max-width:560px;width:100%;
    text-align:center;
    padding:48px 36px;
    background:rgba(247,243,237,.08);
    backdrop-filter:blur(18px) saturate(1.2);
    -webkit-backdrop-filter:blur(18px) saturate(1.2);
    border:1px solid rgba(255,255,255,.18);
    border-radius:24px;
    box-shadow:0 30px 80px -20px rgba(0,0,0,.4);
  }
  .logo{
    width:72px;height:72px;border-radius:50%;
    background:#7a9b76;color:#fff;
    display:grid;place-items:center;
    margin:0 auto 22px;
    box-shadow:0 12px 30px -10px rgba(0,0,0,.4);
  }
  h1{
    font-family:'Playfair Display',Georgia,serif;
    font-weight:500;font-style:italic;
    font-size:clamp(28px,4vw,40px);
    line-height:1.18;
    margin-bottom:14px;
    letter-spacing:-.01em;
  }
  h1 span{color:#f0c9a8;font-style:normal;font-weight:600;}
  .eyebrow{
    display:inline-block;
    text-transform:uppercase;
    letter-spacing:.22em;
    font-size:12px;font-weight:700;
    color:rgba(255,255,255,.85);
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.3);
    padding:7px 16px;border-radius:999px;
    margin-bottom:24px;
  }
  p.lead{
    font-size:16px;line-height:1.6;
    color:rgba(255,255,255,.9);
    max-width:42ch;margin:0 auto 32px;
  }
  form{display:flex;flex-direction:column;gap:14px;max-width:340px;margin:0 auto;}
  .field{position:relative;}
  input[type=password]{
    width:100%;padding:14px 18px;
    font-size:16px;
    background:rgba(255,255,255,.95);
    color:#2b3a26;
    border:1px solid rgba(255,255,255,.4);
    border-radius:14px;
    outline:none;
    transition:box-shadow .2s,border-color .2s;
  }
  input[type=password]:focus{
    border-color:#f0c9a8;
    box-shadow:0 0 0 4px rgba(240,201,168,.25);
  }
  input[type=password]::placeholder{color:#6f7c69;}
  button{
    padding:14px 22px;font-size:16px;font-weight:700;
    color:#fff;background:#c47a5b;
    border:0;border-radius:14px;cursor:pointer;
    box-shadow:0 10px 26px -10px rgba(168,98,63,.7);
    transition:transform .15s,box-shadow .15s,background .15s;
  }
  button:hover{background:#b66a4d;transform:translateY(-1px);box-shadow:0 14px 32px -10px rgba(168,98,63,.8);}
  button:active{transform:translateY(0);}
  .error{
    color:#ffcdc4;font-size:14px;
    min-height:20px;
    margin-top:-4px;
  }
  .hint{
    margin-top:24px;
    font-size:13px;
    color:rgba(255,255,255,.65);
  }
  .foot{
    position:relative;
    z-index:1;
    margin-top:22px;
    font-size:12px;
    color:rgba(255,255,255,.65);
    letter-spacing:.06em;
    text-align:center;
  }
  @media(max-width:540px){
    .card{padding:32px 22px;}
    body{padding:18px;}
    .foot{font-size:11px;margin-top:18px;}
    h1{font-size:clamp(26px,7vw,32px);}
    p.lead{font-size:15px;margin-bottom:24px;}
    .eyebrow{margin-bottom:18px;}
    .logo{width:62px;height:62px;margin-bottom:16px;}
  }
  @media(max-height:760px){
    .card{padding:30px 30px;}
    .logo{width:58px;height:58px;margin-bottom:14px;}
    .eyebrow{margin-bottom:16px;padding:5px 14px;font-size:11px;}
    h1{font-size:clamp(24px,3vw,32px);margin-bottom:10px;}
    p.lead{font-size:15px;margin-bottom:22px;line-height:1.5;}
    .hint{margin-top:18px;}
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"></path>
      <path d="M2 21c0-3 1.85-5.36 5.08-6"></path>
    </svg>
  </div>

  <span class="eyebrow">Site en construction</span>

  <h1>Laëti'<span>Bienfaits</span><br>arrive bientôt.</h1>

  <p class="lead">Le nouveau site de votre naturopathe est en cours de préparation. Pour découvrir la version en cours, entrez votre mot de passe.</p>

  <form id="lb-form" autocomplete="off">
    <div class="field">
      <input id="pw" type="password" placeholder="Mot de passe" autofocus required>
    </div>
    <button type="submit">Accéder à l'aperçu</button>
    <div class="error" id="err" role="alert"></div>
  </form>

  <p class="hint">Réservé à un usage interne pendant la phase de prévisualisation.</p>
</div>

<div class="foot">© Laëti'Bienfaits — Naturopathie · Kinésiologie</div>

<script>
(function(){
  var PREVIEW_URL = '/preview/strict-v1-editorial/';
  var form = document.getElementById('lb-form');
  var pw = document.getElementById('pw');
  var err = document.getElementById('err');

  async function sha256(text){
    var buf = new TextEncoder().encode(text);
    var hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  }

  // sha256("admin") = 8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918
  var EXPECTED = '8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918';

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    err.textContent = '';
    var val = pw.value.trim();
    if (!val) return;
    try {
      var hash = await sha256(val);
      if (hash === EXPECTED){
        document.cookie = 'lb_access=1; path=/; max-age=' + (60*60*24*7) + '; SameSite=Lax';
        window.location.href = PREVIEW_URL;
      } else {
        err.textContent = 'Mot de passe incorrect.';
        pw.value = '';
        pw.focus();
      }
    } catch (e){
      err.textContent = 'Erreur — réessayez.';
    }
  });

  // Si déjà autorisé, redirige automatiquement
  if (document.cookie.indexOf('lb_access=1') !== -1) {
    window.location.href = PREVIEW_URL;
  }
})();
</script>

</body>
</html>
