server {
    listen 80 default_server;
    server_name _;

    # Le vrai site est désormais servi à la racine (publication publique).
    root /usr/share/nginx/html/preview/strict-v1-editorial;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # www -> apex (évite le contenu dupliqué pour le SEO)
    if ($host = "www.laeti-bienfaits.fr") { return 301 https://laeti-bienfaits.fr$request_uri; }

    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml application/json;
    gzip_min_length 256;

    # robots.txt + sitemap.xml vivent à la racine de l'image (hors du root du site)
    location = /robots.txt { root /usr/share/nginx/html; }
    location = /sitemap.xml { root /usr/share/nginx/html; }

    # Anciennes URLs /preview/* → racine (le site est maintenant public)
    location /preview/ {
        return 301 https://laeti-bienfaits.fr/;
    }

    location ~* \.(jpg|jpeg|png|svg|webp|gif|ico)$ {
        expires 1d;
        access_log off;
    }
    location ~* \.(html|css|js)$ {
        expires 1h;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # 404 → page d'accueil
    error_page 404 = /index.html;
}
