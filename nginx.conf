server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Content-Type-Options nosniff always;

    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml application/json;
    gzip_min_length 256;

    location ~* \.(jpg|jpeg|png|svg|webp|gif|ico)$ {
        expires 1d;
        access_log off;
    }
    location ~* \.(html|css|js)$ {
        expires 1h;
    }

    # Protection: redirige /preview/* vers / si pas de cookie lb_access=1
    location /preview/ {
        if ($cookie_lb_access != "1") {
            return 302 /;
        }
        try_files $uri $uri/ $uri/index.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # 404 → renvoie page construction
    error_page 404 = /index.html;
}
